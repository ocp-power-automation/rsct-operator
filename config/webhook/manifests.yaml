---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-rsct-ibm-com-v1alpha1-rsct
  failurePolicy: Fail
  name: vrsct.kb.io
  rules:
  - apiGroups:
    - rsct.ibm.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - rscts
  sideEffects: None
